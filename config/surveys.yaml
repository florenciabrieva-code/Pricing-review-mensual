# Configuracion de surveys de Qualtrics
# Ejecutar scripts/discover_surveys.py para auto-completar los IDs y QIDs

qualtrics:
  surveys:

    simulador_costos_lite:
      name: "[MLB] VOC Simulador de Costos LITE"
      id: null                    # Completar despues de correr discover_surveys.py
      ces_question_id: null       # QID de la pregunta de facilidad/dificultad (Q1)
      doubts_question_id: null    # QID de la pregunta de texto abierto con dudas
      ces_scale:
        easy: [4, 5]              # Ajustar si la escala es 1-7 (easy: [6, 7])
        neutral: [3]
        difficult: [1, 2]

    simulador_costos:
      name: "[MLB] VOC Simulador de Costos"
      id: null
      ces_question_id: null
      doubts_question_id: null
      ces_scale:
        easy: [4, 5]
        neutral: [3]
        difficult: [1, 2]

    costos:
      name: "[MLB] VOC Costos"
      id: null
      ces_question_id: null
      doubts_question_id: null
      ces_scale:
        easy: [4, 5]
        neutral: [3]
        difficult: [1, 2]

    pricing:
      name: "[MLB] VOC Pricing"
      id: null
      ces_question_id: null
      doubts_question_id: null
      awareness_question_id: null  # QID exclusivo de pricing: conocimiento previo de la seccion
      ces_scale:
        easy: [4, 5]
        neutral: [3]
