name: Generar Reporte Mensual

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Año (ej: 2026)"
        required: true
        default: "2026"
        type: string
      month:
        description: "Mes (1-12, ej: 3 para Marzo)"
        required: true
        default: "3"
        type: string
      dry_run:
        description: "Dry run: genera HTML sin ejecutar queries en BQ"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-report:
    name: Generar reporte ${{ inputs.year }}-${{ inputs.month }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt

      - name: Generar reporte HTML
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          EXTRA=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            EXTRA="--dry-run"
          fi
          python scripts/run_report.py \
            --year ${{ inputs.year }} \
            --month ${{ inputs.month }} \
            $EXTRA

      - name: Actualizar index.html
        run: python scripts/update_index.py

      - name: Commit y push del reporte generado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          PERIOD="${{ inputs.year }}-$(printf '%02d' ${{ inputs.month }})"
          git add reports/ index.html
          git diff --staged --quiet && echo "Sin cambios" || (
            git commit -m "report: generar reporte ${PERIOD}" &&
            git push
          )

  deploy-pages:
    name: Deploy a GitHub Pages
    needs: generate-report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout (con reporte recién commiteado)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
